name: Run Sanity Tests on LambdaTest

on:
  workflow_dispatch:

jobs:
  sanity-test:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Sanity Test on LambdaTest
        run: |
          echo "Triggering sanity tests on LambdaTest"

          response=$(curl --location 'https://test-manager-api.lambdatest.com/api/atm/v1/hyperexecute' \
          --header 'Content-Type: application/json' \
          --header 'Authorization: Basic ZGV2YW5zaHNpbmdoOkxUX2tqbXp6SkNZdTcwa1JlRTdsd0UwdzJNT1hMV2cycTcyRU1oNjhCT290NmZZSTFj' \
          --data '{
            "test_run_id": "01KM0QC4Q9S6D5HN7T8QPF257J",
            "concurrency": 1,
            "title": "TR-Devansh"
          }')

          echo "Response: $response"
